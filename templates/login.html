<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grand Hotel – Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 40px;
      width: 400px;
    }

    h1 {
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      color: #444;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    input:focus { border-color: #1a1a2e; }

    button {
      width: 100%;
      padding: 12px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover { background: #2d2d44; }

    .message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .error {
      background: #fdecea;
      color: #c0392b;
      border: 1px solid #f5c6cb;
    }

    .success {
      background: #eafaf1;
      color: #27ae60;
      border: 1px solid #a9dfbf;
    }

    .divider {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-top: 16px;
    }

    .divider a {
      color: #1a1a2e;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Grand Hotel</h1>
    <p class="subtitle">Sign in to manage your booking.</p>

    <!-- Flash messages from Flask -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="message {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          name="username" 
          placeholder="Enter your username"
          required 
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Enter your password"
          required 
        />
      </div>

      <button type="submit">Sign In</button>
    </form>

    <p class="divider">
      Don't have an account? <a href="/register">Register here</a>
    </p>
  </div>
</body>
</html>
